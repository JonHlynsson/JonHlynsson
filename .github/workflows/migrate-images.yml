name: Migrate images from WordPress (one-time)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download media and rewrite links
        run: python3 scripts/migrate_images.py
      - name: Commit results
        run: |
          git config user.name "image-migration-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Migrate WordPress media to local assets"
          git push
